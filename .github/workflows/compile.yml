name: Multi-Arch Compile and Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            output_name: teralone_auth-linux-x64
            use_docker: false
          - os: ubuntu-latest
            arch: i386
            output_name: teralone_auth-linux-x86
            use_docker: true
            image: debian:bookworm
            platform: linux/386
            extra_flags: "--onefile-no-compression"
          - os: ubuntu-latest
            arch: aarch64
            output_name: teralone_auth-linux-arm64
            use_docker: true
            image: ubuntu:22.04
            platform: linux/arm64
            extra_flags: ""
          - os: ubuntu-latest
            arch: armv7
            output_name: teralone_auth-linux-armv7
            use_docker: true
            image: ubuntu:22.04
            platform: linux/arm/v7
            extra_flags: "--onefile-no-compression"
          # --- Termux Native Targets ---
          - os: ubuntu-latest
            arch: aarch64
            output_name: teralone_auth-termux-arm64
            use_termux: true
            image: termux/termux-docker:aarch64
            platform: linux/arm64
          - os: ubuntu-latest
            arch: armv7
            output_name: teralone_auth-termux-armv7
            use_termux: true
            image: termux/termux-docker:arm
            platform: linux/arm/v7
          # --- Windows Targets ---
          - os: windows-latest
            arch: x64
            output_name: teralone_auth-windows-x64
            ext: ".exe"
            use_docker: false
          - os: windows-latest
            arch: x86
            output_name: teralone_auth-windows-x86
            ext: ".exe"
            use_docker: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Windows Build ---
      - name: Setup Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.arch }}

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install nuitka zstandard

      - name: Compile (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m nuitka `
            --onefile `
            --standalone `
            --assume-yes-for-downloads `
            --lto=yes `
            --output-filename=${{ matrix.output_name }}${{ matrix.ext }} `
            teralone_auth.py

      # --- Linux x86_64 Build (Native) ---
      - name: Setup Python (Linux x64)
        if: runner.os == 'Linux' && matrix.arch == 'x86_64' && !matrix.use_termux
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile (Linux x64)
        if: runner.os == 'Linux' && matrix.arch == 'x86_64' && !matrix.use_termux
        run: |
          sudo apt-get update && sudo apt-get install -y patchelf gcc g++
          python -m pip install --upgrade pip
          pip install nuitka zstandard
          python -m nuitka \
            --onefile \
            --standalone \
            --assume-yes-for-downloads \
            --lto=yes \
            --plugin-enable=anti-bloat \
            --python-flag=no_docstrings \
            --python-flag=-O \
            --output-filename=${{ matrix.output_name }} \
            teralone_auth.py

      # --- Linux Docker-based Build (Glibc: i386, ARM64, ARMv7) ---
      - name: Set up QEMU
        if: (matrix.use_docker || matrix.use_termux) && matrix.arch != 'i386'
        uses: docker/setup-qemu-action@v3

      - name: Compile (Linux Docker - Glibc)
        if: matrix.use_docker
        run: |
          docker run --rm --platform ${{ matrix.platform }} -v ${{ github.workspace }}:/work -w /work -e HOST_UID=$(id -u) -e HOST_GID=$(id -g) ${{ matrix.image }} /bin/bash -c "
            export DEBIAN_FRONTEND=noninteractive &&
            export PIP_BREAK_SYSTEM_PACKAGES=1 &&
            (apt-get update || true) &&
            apt-get install -y python3 python3-pip patchelf gcc g++ python3-dev libffi-dev libssl-dev &&
            python3 -m pip install --upgrade pip &&
            pip3 install nuitka zstandard &&
            python3 -m nuitka --onefile --standalone --assume-yes-for-downloads --lto=no --jobs=1 --plugin-enable=anti-bloat --python-flag=no_docstrings --python-flag=-O ${{ matrix.extra_flags }} --output-filename=${{ matrix.output_name }} teralone_auth.py &&
            chown \$HOST_UID:\$HOST_GID ${{ matrix.output_name }}
          "

      # --- Termux Native Build (Bionic) ---
      - name: Compile (Termux Native)
        if: matrix.use_termux
        run: |
          docker run --rm --platform ${{ matrix.platform }} -v ${{ github.workspace }}:/work -w /work -e HOST_UID=$(id -u) -e HOST_GID=$(id -g) ${{ matrix.image }} sh -c "
            pkg update -y &&
            pkg install -y python clang binutils patchelf termux-elf-cleaner &&
            pip install nuitka ordered-set &&
            python -m nuitka --onefile --standalone --clang --onefile-no-compression --jobs=1 --output-filename=${{ matrix.output_name }} teralone_auth.py &&
            termux-elf-cleaner ${{ matrix.output_name }} &&
            chown \$HOST_UID:\$HOST_GID ${{ matrix.output_name }}
          "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: ${{ matrix.output_name }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Build ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
